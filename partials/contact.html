<section class="contact" id="contact">
  <div class="container">
    <div class="section-head">
      <span class="section-eyebrow">Get In Touch</span>
      <h2 class="section-title">Contact <span class="accent">Me</span></h2>
      <p class="section-sub">Get in touch to discuss your project or just say hello.</p>
    </div>

    <div class="contact-inner">
      <div class="contact-info" data-reveal>
        <div class="info-item">
          <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
          <div>
            <h4>Location</h4>
            <p>Pakistan</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
          <div>
            <h4>Email</h4>
            <p>abdullahhayat@email.com</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon"><i class="fa-brands fa-whatsapp"></i></div>
          <div>
            <h4>WhatsApp</h4>
            <p>+92XXXXXXXXXX</p>
          </div>
        </div>

        <div class="contact-socials">
          <a href="https://github.com/yourusername" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
          <a href="https://linkedin.com/in/yourprofile" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="https://fiverr.com/abdullahbloach4" target="_blank" rel="noopener" aria-label="Fiverr"><i class="fa-solid fa-bolt"></i></a>
        </div>
      </div>

      <form class="contact-form" id="contactForm" data-reveal>
        <div class="form-row">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        <input type="text" name="subject" placeholder="Subject" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn btn-primary form-submit">
          Send Message <i class="fa-solid fa-paper-plane"></i>
        </button>
        <p class="form-status" id="formStatus"></p>
      </form>
    </div>
  </div>
</section>
